sentence=Driver + examples for the Seeed reTerminal E1001 (mono) and E1002 (color) e-paper terminals.
paragraph=True 4-level grayscale and fast 1-bit partial refresh on the E1001 (UC8179), 6-colour on the E1002 (Spectra-6), the schematic-confirmed board pin map, and on-board peripheral helpers (buttons, SHT4x temp/hum, PDM mic, buzzer, LED). Standalone and thin-client examples included. The color driver only compiles if GxEPD2 is installed.
category=Display
